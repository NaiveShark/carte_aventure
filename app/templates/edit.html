{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-xl">
    <div class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-6 shadow-xl backdrop-blur-sm">
        <h2 class="text-xl font-bold tracking-tight text-white mb-6">
            {{ 'Modify Operational Entity' if product else 'Register New Asset' }}
        </h2>
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Product Designation</label>
                <input type="text" name="name" class="w-full rounded-lg border border-zinc-800 bg-zinc-950 px-3 py-2 text-sm text-white placeholder-zinc-600 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition" value="{{ product['name'] if product else '' }}" placeholder="e.g., Quantum Processor Core" required>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Descriptive Logs</label>
                <textarea name="description" class="w-full rounded-lg border border-zinc-800 bg-zinc-950 px-3 py-2 text-sm text-white placeholder-zinc-600 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition" rows="3" placeholder="Identify capabilities or target systems...">{{ product['description'] if product else '' }}</textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Evaluation Cost ($)</label>
                <input type="number" step="0.01" name="price" class="w-full rounded-lg border border-zinc-800 bg-zinc-950 px-3 py-2 text-sm text-white placeholder-zinc-600 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition" value="{{ product['price'] if product else '0.00' }}" required>
            </div>

            <div class="relative flex items-start pt-2">
                <div class="flex h-5 items-center">
                    <input type="checkbox" name="in_stock" id="in_stock" class="h-4 w-4 rounded border-zinc-800 bg-zinc-950 text-emerald-500 focus:ring-emerald-500 focus:ring-offset-zinc-950" {% if not product or product['in_stock'] %}checked{% endif %}>
                </div>
                <div class="ml-3 text-sm">
                    <label for="in_stock" class="font-medium text-zinc-300">Authorize Allocation Ready</label>
                    <p class="text-xs text-zinc-500">Makes item discoverable and available for dynamic fetching.</p>
                </div>
            </div>

            <div class="flex items-center justify-between border-t border-zinc-800/60 pt-5 mt-6">
                <a href="/" class="text-sm font-medium text-zinc-400 hover:text-zinc-200 transition">← Absolute Return</a>
                <button type="submit" class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-semibold text-zinc-950 hover:bg-emerald-400 transition shadow-lg shadow-emerald-500/10">Commit Schema</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
