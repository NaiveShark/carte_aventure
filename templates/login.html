{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block body %}
{% if error %}
<h4>Error: {{ error }}</h4>
{% endif %}
<form method="POST">

<label>Username 
<div class="field border">
<input name="username">
</div>
</label>

	
<label>Password 
<div class="field border">
<input name="password" type="password" value="">
</div>
</label>

	
<button type="submit">Login</button>
</form>
{% endblock %}
