{% extends 'base.html' %}
{% block title %}Map tools{% endblock %}

{% block addition_style %}

    <!-- Relative paths point directly to your local Starlette files -->
    <link rel="stylesheet" href="statics/ol/ol.css">
    <script src="statics/ol/ol.js"></script>
    <style>
        #map { width: 100%; height: 500px; }
    </style>
{% endblock %}

{% block body %}

    <div id="map"></div>
    <script>
        // OpenLayers is now loaded locally and ready to use
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    // WARNING: OSM() requires internet. 
                    // See below to make the basemap local too!
                    source: new ol.source.OSM() 
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([-105, 50]),
                zoom: 12
            })
        });
    </script>




{% endblock %}
